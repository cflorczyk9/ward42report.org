<!-- Source for preview.png (the social share card). Number-free by design so it
     never goes out of date. To regenerate: open at exactly 1200x630 and
     screenshot to preview.png. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{ --ink:#0a0a0a; --paper:#ffffff; --blue:#0089cf; --red:#d40b2f; --muted:#5a5a55; --hairline:#e6e6e6; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ width:1200px; height:630px; overflow:hidden; }
  body{ background:var(--paper); color:var(--ink); font-family:"Inter",sans-serif; position:relative; -webkit-font-smoothing:antialiased; }

  .topbar{ position:absolute; top:0; left:0; width:100%; height:10px; background:var(--blue); }

  .card{ position:absolute; inset:10px 0 0 0; padding:72px 80px 56px; display:flex; flex-direction:column; justify-content:space-between; }

  .kicker{ display:flex; align-items:center; gap:14px; font-family:"Archivo",sans-serif; font-weight:700; font-size:19px; letter-spacing:.22em; text-transform:uppercase; color:var(--ink); }
  .kicker .star{ color:var(--red); font-size:18px; }

  h1{ font-family:"Archivo",sans-serif; font-weight:900; font-size:104px; line-height:.9; letter-spacing:-.02em; text-transform:uppercase; margin:26px 0 0; }

  .subtitle{ font-family:"Inter",sans-serif; font-weight:400; font-size:29px; line-height:1.4; color:var(--muted); max-width:900px; margin-top:26px; }
  .subtitle b{ color:var(--ink); font-weight:600; }

  .rule{ width:100%; height:3px; background:var(--ink); }

  .footer{ display:flex; align-items:center; justify-content:space-between; gap:24px; padding-top:22px; }
  .footer .l{ font-family:"Archivo",sans-serif; font-weight:600; font-size:18px; letter-spacing:.02em; color:var(--ink); }
  .footer .l .dot{ color:var(--muted); font-weight:400; margin:0 8px; }
  .footer .stars{ color:var(--red); font-size:20px; letter-spacing:.16em; }
</style>

<div class="topbar"></div>
<div class="card">
  <div>
    <div class="kicker"><span class="star">&#10038;</span> An Independent Civic Report <span class="star">&#10038;</span></div>
    <h1>The 42nd Ward<br>Service Report</h1>
    <p class="subtitle">How fast the ward resolves resident 311 requests, <b>live from the City of Chicago&rsquo;s open data.</b></p>
  </div>
  <div>
    <div class="rule"></div>
    <div class="footer">
      <div class="l">Independent <span class="dot">&middot;</span> community-built <span class="dot">&middot;</span> always current</div>
      <div class="stars">&#10038; &#10038;</div>
    </div>
  </div>
</div>
