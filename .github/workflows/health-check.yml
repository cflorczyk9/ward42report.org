name: 311 data health check

# Guarantees you find out fast if the site's data source ever breaks.
# Runs daily against the City of Chicago 311 feed and FAILS (which emails you,
# the repo owner, by default) if the dataset is gone, renamed, empty, or has
# changed the fields the site depends on. The page itself always shows live
# data; this is the alarm for the one thing outside your control: the City.

on:
  schedule:
    - cron: '20 13 * * *'   # ~08:20 America/Chicago, every day
  workflow_dispatch:          # lets you run it on demand from the Actions tab

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Verify the 311 feed is alive, populated, and unchanged
        run: |
          python3 - <<'PY'
          import json, sys, urllib.parse, urllib.request, urllib.error

          base = "https://data.cityofchicago.org/resource/v6vf-nfxy.json"
          params = {
              # The exact columns the site reads. If any is renamed/removed,
              # Socrata returns HTTP 400 and this step fails.
              "$select": "sr_number,sr_type,status,last_modified_date,created_date,ward,latitude,longitude",
              "$where": "ward='42'",
              "$limit": "1",
          }
          url = base + "?" + urllib.parse.urlencode(params)
          print("Requesting:", url)

          try:
              with urllib.request.urlopen(url, timeout=30) as r:
                  body = r.read().decode("utf-8")
          except urllib.error.HTTPError as e:
              print(f"::error::311 feed returned HTTP {e.code}. The dataset may have been "
                    f"renamed, retired, or a field changed. The site needs updating.")
              try:
                  print(e.read().decode("utf-8", "replace")[:600])
              except Exception:
                  pass
              sys.exit(1)
          except Exception as e:
              print(f"::error::Could not reach the City of Chicago 311 feed: {e}")
              sys.exit(1)

          try:
              rows = json.loads(body)
          except Exception:
              print("::error::311 feed did not return valid JSON.")
              print(body[:600]); sys.exit(1)

          if not isinstance(rows, list) or len(rows) < 1:
              print("::error::311 feed returned OK but no Ward 42 rows. Data may have "
                    "stopped publishing.")
              print(body[:600]); sys.exit(1)

          required = ["sr_type", "status", "created_date", "last_modified_date"]
          missing = [f for f in required if f not in rows[0]]
          if missing:
              print(f"::error::Required field(s) missing from the 311 record "
                    f"(schema changed): {missing}. The site needs updating.")
              print(json.dumps(rows[0])[:600]); sys.exit(1)

          print("OK: 311 feed is live, Ward 42 data present, schema intact.")
          print("Sample:", rows[0].get("sr_type"), "|", rows[0].get("created_date"))
          PY
